<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Try the Widget – ChemDCAT-AP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #00796b;
      --nav-height: 56px;
    }
    body { font-family: 'Roboto', sans-serif; background: #1a1a2e; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-height);
      background: var(--primary);
      color: #fff;
      display: flex; align-items: center;
      padding: 0 24px; gap: 24px;
      box-shadow: 0 2px 4px rgba(0,0,0,.2);
    }
    nav .nav-brand {
      font-size: 18px; font-weight: 500;
      text-decoration: none; color: #fff;
    }
    nav .nav-links { display: flex; gap: 8px; margin-left: auto; }
    nav .nav-links a {
      color: rgba(255,255,255,.87);
      text-decoration: none; font-size: 14px; font-weight: 500;
      padding: 6px 12px; border-radius: 4px;
      transition: background .15s;
    }
    nav .nav-links a:hover { background: rgba(255,255,255,.15); }
    nav .nav-links a.active { background: rgba(255,255,255,.2); color: #fff; }

    .iframe-wrapper {
      position: fixed;
      top: var(--nav-height);
      left: 0; right: 0; bottom: 0;
    }
    iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.7);
      color: rgba(255,255,255,.6);
      font-size: 12px;
      padding: 6px 16px;
      display: flex; align-items: center; gap: 12px;
      pointer-events: none;
    }
    .bottom-bar a { color: rgba(255,255,255,.8); pointer-events: all; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">⚗️ ChemDCAT-AP Widget</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="widget-page.html" class="active">Try it</a>
    <a href="howto.html">How-to</a>
    <a href="https://github.com/HendrikBorgelt/React_flow_test" target="_blank">GitHub ↗</a>
  </div>
</nav>

<div class="iframe-wrapper">
  <iframe
    src="chemdcat/"
    title="ChemDCAT-AP metadata widget"
    allow="downloads"
  ></iframe>
</div>

<div class="bottom-bar">
  <span>Widget running in iframe</span>
  <a href="chemdcat/" target="_blank">Open full screen ↗</a>
</div>

</body>
</html>
